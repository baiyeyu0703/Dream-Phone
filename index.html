<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 1. viewport-fit=cover 是消除边缘白边的关键 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    
    <!-- 2. iOS 全屏 WebApp 配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- black-translucent 令内容填充状态栏，实现真正的全屏沉浸 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="壁纸">
    
    <!-- 3. 主题色，影响 Safari 地址栏等 UI 颜色 -->
    <meta name="theme-color" content="#1a2540">
    
    <title>壁纸</title>

    <style>
        /* ---------- 重置与全屏适配 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            /* 使用 -webkit-fill-available 适配 iOS 工具栏切换 */
            height: 100vh;
            height: -webkit-fill-available; 
            overflow: hidden;
            /* 背景色必须与壁纸主色调一致，防止滑动露出白边 */
            background: #1a2540; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            touch-action: none; /* 禁用所有原生手势，防止被拉动 */
        }

        /* ---------- 全屏壁纸容器 ---------- */
        .wallpaper-container {
            position: fixed;
            /* 使用 inset: 0 并配合 viewport-fit=cover 填充刘海区域 */
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            
            /* iOS 风格渐变壁纸 */
            background:
                radial-gradient(ellipse 80% 60% at 30% 25%, #5b7cb5 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 70% 30%, #7b6daf 0%, transparent 50%),
                radial-gradient(ellipse 70% 55% at 50% 45%, #4a6d9e 0%, transparent 50%),
                radial-gradient(ellipse 90% 60% at 40% 65%, #3d5a85 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 75% 70%, #5e4f8b 0%, transparent 45%),
                radial-gradient(ellipse 60% 50% at 20% 80%, #2c4a6e 0%, transparent 50%),
                linear-gradient(180deg, #1a2a3d 0%, #1e2840 25%, #1c2535 50%, #18202d 75%, #141c28 100%);
            background-color: #1a2540;
            z-index: 1;
        }

        /* 针对 iOS 安全区域的强制填充 (预防性设置) */
        @supports (padding: env(safe-area-inset-top)) {
            .wallpaper-container {
                /* 确保背景延伸到所有安全区域外 */
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
                margin: calc(-1 * env(safe-area-inset-top)) calc(-1 * env(safe-area-inset-right)) calc(-1 * env(safe-area-inset-bottom)) calc(-1 * env(safe-area-inset-left));
            }
        }

        /* 光斑动画保持不变... */
        .wallpaper-container::before, .wallpaper-container::after {
            /* ... (保持你原来的代码即可) ... */
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.12) 0%, transparent 70%);
            filter: blur(30px);
            animation: gentleFloat 12s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes gentleFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-10px, -8px) scale(0.95); }
        }
    </style>
</head>
<body>
    <div class="wallpaper-container" id="wallpaperContainer"></div>

    <script>
        // 禁止页面滚动的极致处理
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // PWA 逻辑和其他脚本保持不变...
    </script>
</body>
</html>
