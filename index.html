<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 1. viewport-fit=cover 是基础 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- 2. 状态栏必须是 black-translucent 才能让背景真正上移 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="壁纸">
    
    <!-- 3. 将主题色设为渐变最底部的颜色 #141c28 -->
    <meta name="theme-color" content="#141c28">
    <title>壁纸</title>

    <style>
        /* ---------- 终极方案：将背景直接绑定在 html 上 ---------- */
        /* 在 iOS PWA 中，只有直接给 html 设置背景，系统才会将其延伸到安全区域之外 */
        html {
            height: 100%;
            background-color: #141c28; /* 核心：必须和渐变底部颜色一致 */
            /* 直接在 html 上绘制渐变 */
            background-image: 
                radial-gradient(ellipse 80% 60% at 30% 25%, #5b7cb5 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 70% 30%, #7b6daf 0%, transparent 50%),
                radial-gradient(ellipse 70% 55% at 50% 45%, #4a6d9e 0%, transparent 50%),
                radial-gradient(ellipse 90% 60% at 40% 65%, #3d5a85 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 75% 70%, #5e4f8b 0%, transparent 45%),
                radial-gradient(ellipse 60% 50% at 20% 80%, #2c4a6e 0%, transparent 50%),
                linear-gradient(180deg, #1a2a3d 0%, #1e2840 25%, #1c2535 50%, #18202d 75%, #141c28 100%);
            background-attachment: fixed; /* 关键：固定背景，防止拉动 */
            background-size: 100% 100%;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed; /* 再次锁定防止滑动 */
            /* body 设为透明，露出 html 的背景 */
            background: transparent;
            touch-action: none;
        }

        /* 装饰光斑改用绝对定位在 body 里的容器中 */
        .decoration-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .decoration-layer::before, .decoration-layer::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            animation: gentleFloat 15s ease-in-out infinite;
        }

        .decoration-layer::before {
            width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            top: 10%; left: 10%;
        }

        .decoration-layer::after {
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(200, 180, 220, 0.08) 0%, transparent 70%);
            bottom: 20%; right: 10%;
            animation-direction: reverse;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, -20px); }
        }
    </style>

    <script>
        // 关键：动态修改 Manifest 的展示模式
        (function() {
            const manifestData = {
                name: '动态壁纸',
                short_name: '壁纸',
                start_url: './',
                // 使用 fullscreen 而不是 standalone ！！！
                // fullscreen 模式会更激进地尝试占满物理全屏
                display: 'fullscreen', 
                orientation: 'portrait',
                background_color: '#141c28', // 必须与渐变底色一致
                theme_color: '#141c28',
                icons: [{
                    src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192"><rect width="192" height="192" fill="%23141c28"/></svg>',
                    sizes: '192x192',
                    type: 'image/svg+xml'
                }]
            };

            const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/manifest+json' });
            const linkEl = document.createElement('link');
            linkEl.rel = 'manifest';
            linkEl.href = URL.createObjectURL(manifestBlob);
            document.head.appendChild(linkEl);
        })();
    </script>
</head>

<body>
    <div class="decoration-layer"></div>
    <script>
        // 极致禁用滚动
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        // 禁止双击缩放
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
