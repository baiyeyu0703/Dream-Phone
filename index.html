<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 1. 基础配置：viewport-fit=cover 必须保留 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- 2. 状态栏设置为黑色透明，确保顶部也完全沉浸 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="壁纸">
    
    <!-- 3. 将主题色设为渐变最底部的颜色，欺骗系统渲染层 -->
    <meta name="theme-color" content="#141c28">
    <title>壁纸</title>

    <style>
        /* ---------- 强制全屏重置 ---------- */
        html {
            /* 确保 html 自身没有间隙 */
            height: 100%;
            overflow: hidden;
            background-color: #141c28; /* 兜底颜色 */
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 关键：使用 fixed 锁定，防止任何手势拖拽出白边 */
            position: fixed;
            background-color: #141c28;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        /* ---------- 物理溢出容器 ---------- */
        .wallpaper-container {
            /* 【终极核心】：不再设置 100% 或 100vh */
            /* 而是使用 fixed 定位并将上下左右全部“顶”出屏幕之外 */
            position: fixed;
            top: -100px;    /* 向上溢出，盖住刘海和状态栏 */
            left: -100px;   /* 向左溢出 */
            right: -100px;  /* 向右溢出 */
            bottom: -100px; /* 向下溢出，强行盖住底部 Home 条安全区 */
            
            /* 确保背景绘制区域覆盖整个溢出空间 */
            z-index: 1;
            display: block;

            /* 保持原来的渐变样式 */
            background:
                radial-gradient(ellipse 80% 60% at 30% 25%, #5b7cb5 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 70% 30%, #7b6daf 0%, transparent 50%),
                radial-gradient(ellipse 70% 55% at 50% 45%, #4a6d9e 0%, transparent 50%),
                radial-gradient(ellipse 90% 60% at 40% 65%, #3d5a85 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 75% 70%, #5e4f8b 0%, transparent 45%),
                radial-gradient(ellipse 60% 50% at 20% 80%, #2c4a6e 0%, transparent 50%),
                linear-gradient(180deg, #1a2a3d 0%, #1e2840 25%, #1c2535 50%, #18202d 75%, #141c28 100%);
            background-size: cover;
        }

        /* 装饰用的光斑：因为容器溢出了，光斑的定位需要稍微调整 */
        .wallpaper-container::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.12) 0%, transparent 70%);
            top: 25%;  /* 调整位置 */
            left: 25%;
            filter: blur(30px);
            animation: gentleFloat 12s ease-in-out infinite;
        }

        .wallpaper-container::after {
            content: '';
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 180, 220, 0.10) 0%, transparent 70%);
            bottom: 30%;
            right: 25%;
            filter: blur(35px);
            animation: gentleFloat 15s ease-in-out infinite reverse;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-15px, -15px) scale(1.1); }
        }
    </style>
</head>

<body>
    <!-- 溢出容器 -->
    <div class="wallpaper-container"></div>

    <script>
        // 彻底切断任何形式的滚动
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        
        // 动态 manifest 逻辑（同步 theme_color）
        (function() {
            const manifestData = {
                display: 'standalone',
                start_url: './',
                background_color: '#141c28', // 必须与 CSS 底部颜色一致
                theme_color: '#141c28',
                icons: [{ src: '', sizes: '192x192', type: 'image/png' }] // 简写
            };
            const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/manifest+json' });
            const linkEl = document.createElement('link');
            linkEl.rel = 'manifest';
            linkEl.href = URL.createObjectURL(manifestBlob);
            document.head.appendChild(linkEl);
        })();
    </script>
</body>
</html>
