<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 1. 强制覆盖所有缩放和安全区域 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="壁纸">
    
    <!-- 2. 将主题色设置为渐变最底部的颜色，防止任何可能的闪烁 -->
    <meta name="theme-color" content="#141c28">
    
    <title>壁纸</title>

    <style>
        /* ---------- 终极全屏重置 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            /* 关键：禁止所有方向的滚动和溢出 */
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed; /* 防止橡皮筋效果 */
            background: #141c28; /* 与壁纸底部颜色完全一致 */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none;
        }

        /* ---------- 终极壁纸容器 ---------- */
        .wallpaper-container {
            /* 使用 fixed 并配合稍微“溢出”的尺寸 */
            position: fixed;
            
            /* 【核心策略】 */
            /* 使用 dvh (Dynamic Viewport Height) 适配 iOS 动态高度 */
            /* 左右拉伸 0，但上下通过负值 inset 强行“挤进”刘海和 Home 条区域 */
            top: -1px; 
            left: 0;
            right: 0;
            bottom: -5vh; /* 故意多出 5% 的高度，确保填满底部 Home 条下方 */
            
            width: 100vw;
            height: 105dvh; /* 105% 的动态视口高度 */

            /* 保持原来的渐变 */
            background:
                radial-gradient(ellipse 80% 60% at 30% 25%, #5b7cb5 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 70% 30%, #7b6daf 0%, transparent 50%),
                radial-gradient(ellipse 70% 55% at 50% 45%, #4a6d9e 0%, transparent 50%),
                radial-gradient(ellipse 90% 60% at 40% 65%, #3d5a85 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 75% 70%, #5e4f8b 0%, transparent 45%),
                radial-gradient(ellipse 60% 50% at 20% 80%, #2c4a6e 0%, transparent 50%),
                linear-gradient(180deg, #1a2a3d 0%, #1e2840 25%, #1c2535 50%, #18202d 75%, #141c28 100%);
            background-size: cover;
            background-attachment: fixed;
            z-index: 1;
        }

        /* 光斑效果维持原样 */
        .wallpaper-container::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.12) 0%, transparent 70%);
            top: 15%;
            left: 20%;
            filter: blur(30px);
            animation: gentleFloat 12s ease-in-out infinite;
        }

        .wallpaper-container::after {
            content: '';
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 180, 220, 0.10) 0%, transparent 70%);
            bottom: 25%;
            right: 15%;
            filter: blur(35px);
            animation: gentleFloat 15s ease-in-out infinite reverse;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-10px, -8px) scale(0.95); }
        }
    </style>
</head>
<body>
    <div class="wallpaper-container"></div>

    <script>
        // 极致禁用滚动：防止任何可能的拉动导致露出底色
        window.addEventListener('scroll', (e) => e.preventDefault(), { passive: false });
        document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

        // 防止双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
